spring.application.name=QueueLess
spring.profiles.default=mysql
spring.config.import=optional:file:.env.properties

server.port=${SERVER_PORT:8082}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
spring.jpa.open-in-view=false

spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.redis.enabled=false

app.jwt.secret=${JWT_SECRET:ReplaceThisWithAtLeast32CharactersForQueueLessApp}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:180}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@queueless.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:System Admin}
app.bootstrap.admin.phone=${BOOTSTRAP_ADMIN_PHONE:9999999999}
app.frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

app.features.redis-enabled=${REDIS_ENABLED:false}
app.features.kafka-enabled=${KAFKA_ENABLED:false}
app.features.ai-enabled=${AI_ENABLED:false}
app.kafka.queue-topic=${KAFKA_QUEUE_TOPIC:queue.events}
app.notifications.realtime-enabled=${NOTIFICATIONS_REALTIME_ENABLED:true}
app.notifications.email.enabled=${NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.from=${NOTIFICATIONS_EMAIL_FROM:no-reply@queueless.local}
app.notifications.email.subject-prefix=${NOTIFICATIONS_EMAIL_SUBJECT_PREFIX:[QueueLess]}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.admin.auto-create=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.queueless.queueless.dto.event

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:*}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

logging.level.com.queueless.queueless=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
