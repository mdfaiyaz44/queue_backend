server.port=0

spring.datasource.url=jdbc:h2:mem:queueless_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=QueueLessTestSecretKeyNeedsThirtyTwoChars
app.jwt.expiration-minutes=180
app.bootstrap.admin.email=admin@queueless.test
app.bootstrap.admin.password=Admin@12345
app.bootstrap.admin.name=Test Admin
app.bootstrap.admin.phone=9999999999

app.features.redis-enabled=false
app.features.kafka-enabled=false
app.features.ai-enabled=false
app.kafka.queue-topic=queue.events.test

spring.data.redis.repositories.enabled=false
